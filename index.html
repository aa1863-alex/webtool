                } else if (powerUp.type === 'shield') {
                    // 防護罩 - 盾牌圖案
                    ctx.fillStyle = '#4ecdc4';
                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY - 12);
                    ctx.quadraticCurveTo(centerX + 10, centerY - 8, centerX + 10, centerY + 2);
                    ctx.quadraticCurveTo(centerX + 8, centerY + 8, centerX, centerY + 12);
                    ctx.quadraticCurveTo(centerX - 8, centerY + 8, centerX - 10, centerY + 2);
                    ctx.quadraticCurveTo(centerX - 10, centerY - 8, centerX, centerY - 12);
                    ctx.fill();
                    
                    // 盾牌裝飾
                    ctx.fillStyle = '#26a69a';
                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY - 8);
                    ctx.lineTo(centerX + 6, centerY - 4);
                    ctx.lineTo(centerX + 6, centerY + 4);
                    ctx.lineTo(centerX, centerY + 8);
                    ctx.lineTo(centerX - 6, centerY + 4);
                    ctx.lineTo(centerX - 6, centerY - 4);
                    ctx.closePath();
                    ctx.fill();
                    
                } else if (powerUp.type === 'health') {
                    // 救援道具 - 十字醫療標誌
                    ctx.fillStyle = '#e91e63';
                    
                    // 十字橫線
                    ctx.fillRect(centerX - 10, centerY - 3, 20, 6);
                    // 十字豎線
                    ctx.fillRect(centerX - 3, centerY - 10, 6, 20);
                    
                    // 醫療包背景
                    ctx.strokeStyle = '#ad1457';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(centerX - 12, centerY - 12, 24, 24);
                    
                    // 脈衝效果
                    const pulseSize = Math.sin(Date.now() * 0.01) * 2;
                    ctx.strokeStyle = 'rgba(233, 30, 99, 0.5)';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(centerX - 12 - pulseSize, centerY - 12 - pulseSize, 24 + pulseSize * 2, 24 + pulseSize * 2);
                }
                
                ctx.shadowBlur = 0;
                
                // 旋轉動畫效果
                const rotation = Date.now() * 0.005;
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(rotation);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.arc(0, 0, powerUp.width / 2 + 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        function drawParticles() {
            particles.forEach(particle => {
                ctx.globalAlpha = particle.alpha;
                ctx.fillStyle = particle.color;
                ctx.fillRect(particle.x, particle.y, 3, 3);
            });
            ctx.globalAlpha = 1;
        }

        function drawSuperBeam() {
            if (superBeam.charging) {
                // 充電效果
                const chargePercent = superBeam.chargeTime / superBeam.maxChargeTime;
                const centerX = player.x + player.width / 2;
                const centerY = player.y + player.height / 2;
                
                // 充電光環
                ctx.strokeStyle = `rgba(255, 235, 59, ${chargePercent})`;
                ctx.lineWidth = 4;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.arc(centerX, centerY, 60 * chargePercent, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
                
                // 充電粒子
                for (let i = 0; i < 8; i++) {
                    const angle = (i * Math.PI * 2) / 8 + superBeam.chargeTime * 0.1;
                    const distance = 40 + Math.sin(superBeam.chargeTime * 0.2 + i) * 10;
                    const x = centerX + Math.cos(angle) * distance;
                    const y = centerY + Math.sin(angle) * distance;
                    
                    ctx.fillStyle = '#ffeb3b';
                    ctx.shadowColor = '#ffeb3b';
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.arc(x, y, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
            
            if (superBeam.active) {
                // 超級光束主體
                const beamWidth = 100;
                const centerX = player.x + player.width / 2;
                
                // 光束漸變
                const gradient = ctx.createLinearGradient(centerX - beamWidth/2, 0, centerX + beamWidth/2, 0);
                gradient.addColorStop(0, 'rgba(255, 235, 59, 0)');
                gradient.addColorStop(0.2, 'rgba(255, 235, 59, 0.8)');
                gradient.addColorStop(0.5, 'rgba(255, 193, 7, 1)');
                gradient.addColorStop(0.8, 'rgba(255, 235, 59, 0.8)');
                gradient.addColorStop(1, 'rgba(255, 235, 59, 0)');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(centerX - beamWidth/2, 0, beamWidth, player.y);
                
                // 光束核心
                ctx.fillStyle = '#fff';
                ctx.fillRect(centerX - 20, 0, 40, player.y);
                
                // 光束邊緣效果
                ctx.strokeStyle = '#ff6f00';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(centerX - beamWidth/2, 0);
                ctx.lineTo(centerX - beamWidth/2, player.y);
                ctx.moveTo(centerX + beamWidth/2, 0);
                ctx.lineTo(centerX + beamWidth/2, player.y);
                ctx.stroke();
                
                // 光束閃爍效果
                for (let i = 0; i < 20; i++) {
                    const x = centerX + (Math.random() - 0.5) * beamWidth;
                    const y = Math.random() * player.y;
                    const size = Math.random() * 4 + 2;
                    
                    ctx.fillStyle = '#fff';
                    ctx.shadowColor = '#ffeb3b';
                    ctx.shadowBlur = 8;
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
        }

        function drawLightningAttack() {
            if (lightningAttack.charging) {
                // 充電效果 - 電流環繞玩家
                const chargePercent = lightningAttack.chargeTime / lightningAttack.maxChargeTime;
                const centerX = player.x + player.width / 2;
                const centerY = player.y + player.height / 2;
                
                // 電流環
                for (let i = 0; i < 6; i++) {
                    const angle = (i * Math.PI * 2) / 6 + lightningAttack.chargeTime * 0.1;
                    const radius = 50 * chargePercent;
                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;
                    
                    ctx.strokeStyle = '#ffeb3b';
                    ctx.lineWidth = 3;
                    ctx.shadowColor = '#ffeb3b';
                    ctx.shadowBlur = 10;
                    
                    // 電流線
                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY);
                    ctx.lineTo(x, y);
                    ctx.stroke();
                    
                    // 電流節點
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(x, y, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
            
            if (lightningAttack.active) {
                // 繪製閃電
                lightningAttack.bolts.forEach(bolt => {
                    if (bolt.segments.length < 2) return;
                    
                    ctx.strokeStyle = '#ffeb3b';
                    ctx.lineWidth = 4;
                    ctx.shadowColor = '#ffeb3b';
                    ctx.shadowBlur = 15;
                    
                    // 主閃電
                    ctx.beginPath();
                    ctx.moveTo(bolt.segments[0].x, bolt.segments[0].y);
                    for (let i = 1; i < bolt.segments.length; i++) {
                        ctx.lineTo(bolt.segments[i].x, bolt.segments[i].y);
                    }
                    ctx.stroke();
                    
                    // 閃電核心
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(bolt.segments[0].x, bolt.segments[0].y);
                    for (let i = 1; i < bolt.segments.length; i++) {
                        ctx.lineTo(bolt.segments[i].x, bolt.segments[i].y);
                    }
                    ctx.stroke();
                    
                    // 分支閃電
                    for (let i = 1; i < bolt.segments.length - 1; i += 2) {
                        if (Math.random() < 0.3) {
                            const branchLength = 20 + Math.random() * 30;
                            const branchAngle = (Math.random() - 0.5) * Math.PI;
                            const branchX = bolt.segments[i].x + Math.cos(branchAngle) * branchLength;
                            const branchY = bolt.segments[i].y + Math.sin(branchAngle) * branchLength;
                            
                            ctx.strokeStyle = '#ffeb3b';
                            ctx.lineWidth = 2;
                            ctx.beginPath();
                            ctx.moveTo(bolt.segments[i].x, bolt.segments[i].y);
                            ctx.lineTo(branchX, branchY);
                            ctx.stroke();
                        }
                    }
                    
                    ctx.shadowBlur = 0;
                });
            }
        }

        function drawSuperBeamUI() {
            // 超級光束狀態顯示
            const uiX = 20;
            const uiY = canvas.height - 80;
            
            if (superBeam.charging) {
                const chargePercent = superBeam.chargeTime / superBeam.maxChargeTime;
                
                // 充電條背景
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(uiX, uiY, 200, 20);
                
                // 充電條
                ctx.fillStyle = chargePercent >= 1 ? '#4caf50' : '#ffeb3b';
                ctx.fillRect(uiX, uiY, 200 * chargePercent, 20);
                
                // 充電條邊框
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(uiX, uiY, 200, 20);
                
                // 充電文字
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px Arial';
                ctx.fillText(chargePercent >= 1 ? '按V發射超級光束！' : '按住V充電中...', uiX, uiY - 5);
                
            } else if (superBeam.active) {
                // 光束持續時間
                const durationPercent = superBeam.duration / superBeam.maxDuration;
                
                ctx.fillStyle = 'rgba(255, 193, 7, 0.8)';
                ctx.fillRect(uiX, uiY, 200, 20);
                
                ctx.fillStyle = '#ff6f00';
                ctx.fillRect(uiX, uiY, 200 * durationPercent, 20);
                
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(uiX, uiY, 200, 20);
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px Arial';
                ctx.fillText('超級光束發射中！', uiX, uiY - 5);
                
            } else if (superBeam.cooldown > 0) {
                // 冷卻時間
                const cooldownPercent = 1 - (superBeam.cooldown / superBeam.maxCooldown);
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(uiX, uiY, 200, 20);
                
                ctx.fillStyle = '#2196f3';
                ctx.fillRect(uiX, uiY, 200 * cooldownPercent, 20);
                
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(uiX, uiY, 200, 20);
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px Arial';
                const remainingTime = Math.ceil(superBeam.cooldown / 60);
                ctx.fillText(`超級光束冷卻中 ${remainingTime}s`, uiX, uiY - 5);
                
            } else {
                // 可用狀態
                ctx.fillStyle = '#4caf50';
                ctx.fillRect(uiX, uiY, 200, 20);
                
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(uiX, uiY, 200, 20);
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px Arial';
                ctx.fillText('超級光束已就緒 - 按住V', uiX, uiY - 5);
            }
        }

                ctx.lineWidth = 2;
                ctx.strokeRect(uiX, uiY, 200, 20);

            } else {
                // 可用狀態
                ctx.fillStyle = '#9c27b0';
                ctx.fillRect(uiX, uiY, 200, 20);
                
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(uiX, uiY, 200, 20);
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px Arial';
                ctx.fillText('閃電攻擊已就緒 - 按住C', uiX, uiY - 5);
            }
        }

        // Element SDK 配置
        async function render(config) {
            const gameTitle = config.game_title || defaultConfig.game_title;
            const playerName = config.player_name || defaultConfig.player_name;
            
            document.getElementById('gameTitle').textContent = gameTitle;
            document.getElementById('playerName').textContent = playerName;
        }

        function mapToCapabilities(config) {
            return {
                recolorables: [],
                borderables: [],
                fontEditable: undefined,
                fontSizeable: undefined
            };
        }

        function mapToEditPanelValues(config) {
            return new Map([
                ["game_title", config.game_title || defaultConfig.game_title],
                ["player_name", config.player_name || defaultConfig.player_name]
            ]);
        }

        // 初始化 Element SDK
        if (window.elementSdk) {
            window.elementSdk.init({
                defaultConfig,
                render,
                mapToCapabilities,
                mapToEditPanelValues
            });
        }

        // 啟動遊戲
        window.addEventListener('load', initGame);
