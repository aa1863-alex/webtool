  <style>
        body {
            box-sizing: border-box;
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);

        .header {

        .section {
            margin-bottom: 40px;

            border: 2px solid #e1e8ed;

            background: #fafbfc;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #3498db;
        }

        .file-upload {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input {
            position: absolute;
            left: -9999px;
        }

        .file-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .file-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .file-status {
            color: #27ae60;
            font-weight: 500;
        }

        .theme-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1.1rem;
            transition: border-color 0.3s ease;
        }

        .theme-input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .fields-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .fields-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        .fields-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        .fields-table tr:nth-child(even) {
            background: #f8f9fa;
        }

        .fields-table tr:hover {
            background: #e3f2fd;
        }

        .checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .field-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.95rem;
        }

        .field-select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.95rem;
            background: white;
        }

        .format-options {
            display: flex;
            gap: 30px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .format-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .format-option:hover {
            border-color: #3498db;
            background: #f0f8ff;
        }

        .format-option.selected {
            border-color: #3498db;
            background: #e3f2fd;
        }

        .format-radio {
            width: 18px;
            height: 18px;
        }

        .format-label {
            font-weight: 500;
            font-size: 1.1rem;
        }

        .process-button {
            width: 100%;
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 10px;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .process-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(39, 174, 96, 0.3);
        }

        .process-button:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #3498db;
            font-weight: 500;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-data {
            text-align: center;
            color: #7f8c8d;
            font-style: italic;
            padding: 40px;
        }

        @media (max-width: 768px) {
            .container {

                border-radius: 10px;

            .content {
                padding: 20px;

            .section {
                padding: 20px;
            }
            
            .format-options {
                flex-direction: column;
                gap: 15px;
            }
            
            .fields-table {
                font-size: 0.9rem;
            }
            
            .fields-table th,
            .fields-table td {
                padding: 10px 8px;
            }
        }
    </style>

 </head>
 <body>
  <div class="container">
   <header class="header">
    <h1 id="app-title">客製化資料報表與個資遮罩產生器</h1>
   </header>
   <div class="content"><!-- 檔案上傳區 -->
    <div class="section">
     <h2 class="section-title" id="upload-section-title">1. 上傳檔案</h2>
     <div class="file-upload">
      <div class="file-input-wrapper"><input type="file" id="fileInput" class="file-input" accept=".xlsx,.csv"> <button class="file-button" onclick="document.getElementById('fileInput').click()"> 選擇檔案... </button>
      </div><span id="fileStatus" class="file-status">尚未選擇檔案</span>
     </div>
    </div><!-- 報表主題設定 -->
    <div class="section">
     <h2 class="section-title" id="theme-section-title">2. 設定報表主題</h2><input type="text" id="reportTitle" class="theme-input" placeholder="請輸入報表標題（例如：2025年第一季客戶分析報告）" value="2025年10月客戶聯絡表">
    </div><!-- 欄位規則設定 -->
    <div class="section">
     <h2 class="section-title" id="fields-section-title">3. 設定欄位規則</h2>
     <div id="fieldsContainer">
      <div class="no-data">
       請先上傳檔案以設定欄位規則
      </div>
     </div>
    </div><!-- 輸出格式選擇 -->
    <div class="section">
     <h2 class="section-title" id="output-section-title">4. 選擇輸出格式並執行</h2>
     <div class="format-options"><label class="format-option selected" for="formatExcel"> <input type="radio" id="formatExcel" name="outputFormat" value="excel" class="format-radio" checked> <span class="format-label">Excel (.xlsx)</span> </label> <label class="format-option" for="formatPDF"> <input type="radio" id="formatPDF" name="outputFormat" value="pdf" class="format-radio"> <span class="format-label">PDF (.pdf)</span> </label> <label class="format-option" for="formatHTML"> <input type="radio" id="formatHTML" name="outputFormat" value="html" class="format-radio"> <span class="format-label">HTML (.html)</span> </label>
     </div>
     <div class="loading" id="loadingIndicator">
      <div class="spinner"></div> 正在處理資料，請稍候...
     </div><button id="processButton" class="process-button" onclick="processAndDownload()" disabled> 開始轉換並下載 </button>
    </div>
   </div>
  </div>
  <script>
        let rawData = [];
        let fieldConfigs = [];

        const defaultConfig = {
            app_title: "客製化資料報表與個資遮罩產生器",
            upload_section_title: "1. 上傳檔案",
            theme_section_title: "2. 設定報表主題",
            fields_section_title: "3. 設定欄位規則",
            output_section_title: "4. 選擇輸出格式並執行"
        };

        // 檔案上傳處理
        document.getElementById('fileInput').addEventListener('change', handleFileUpload);

        // 格式選項點擊處理
        document.querySelectorAll('.format-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.format-option').forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
                this.querySelector('input[type="radio"]').checked = true;
            });
        });

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const fileStatus = document.getElementById('fileStatus');
            fileStatus.textContent = `目前檔案：${file.name}`;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    let workbook;
                    if (file.name.endsWith('.csv')) {
                        const csvData = e.target.result;
                        workbook = XLSX.read(csvData, { type: 'string' });
                    } else {
                        workbook = XLSX.read(e.target.result, { type: 'binary' });
                    }

                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    rawData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                    if (rawData.length > 0) {
                        generateFieldsTable(rawData[0]);
                        document.getElementById('processButton').disabled = false;
                    }
                } catch (error) {
                    fileStatus.textContent = '檔案讀取失敗，請檢查檔案格式';
                    fileStatus.style.color = '#e74c3c';
                }
            };

            if (file.name.endsWith('.csv')) {
                reader.readAsText(file, 'UTF-8');
            } else {
                reader.readAsBinaryString(file);
            }
        }

        function generateFieldsTable(headers) {
            fieldConfigs = headers.map(header => ({
                originalName: header,
                newName: header,
                export: true,
                maskRule: 'none',
                sortRule: 'none'
            }));

            const container = document.getElementById('fieldsContainer');
            container.innerHTML = `
                <table class="fields-table">
                    <thead>
                        <tr>
                            <th>匯出</th>
                            <th>原始欄位名稱</th>
                            <th>重新命名為 (可修改)</th>
                            <th>處理規則</th>
                            <th>排序選項</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${fieldConfigs.map((config, index) => `
                            <tr>
                                <td>
                                    <input type="checkbox" class="checkbox" 
                                           ${config.export ? 'checked' : ''} 
                                           onchange="updateFieldConfig(${index}, 'export', this.checked)" />
                                </td>
                                <td>${config.originalName}</td>
                                <td>
                                    <input type="text" class="field-input" 
                                           value="${config.newName}" 
                                           onchange="updateFieldConfig(${index}, 'newName', this.value)" />
                                </td>
                                <td>
                                    <select class="field-select" 
                                            onchange="updateFieldConfig(${index}, 'maskRule', this.value)">
                                        <option value="none" ${config.maskRule === 'none' ? 'selected' : ''}>(無)</option>
                                        <option value="mask_second" ${config.maskRule === 'mask_second' ? 'selected' : ''}>第二字改為○</option>
                                    </select>
                                </td>
                                <td>
                                    <select class="field-select" 
                                            onchange="updateFieldConfig(${index}, 'sortRule', this.value)">
                                        <option value="none" ${config.sortRule === 'none' ? 'selected' : ''}>(無排序)</option>
                                        <option value="asc" ${config.sortRule === 'asc' ? 'selected' : ''}>遞增排序</option>
                                        <option value="desc" ${config.sortRule === 'desc' ? 'selected' : ''}>遞減排序</option>
                                    </select>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function updateFieldConfig(index, property, value) {
            fieldConfigs[index][property] = value;
        }

        function applyMaskRule(value, rule) {
            if (!value || rule === 'none') return value;
            
            if (rule === 'mask_second') {
                const str = String(value);
                if (str.length >= 2) {
                    return str.charAt(0) + '○' + str.substring(2);
                }
            }
            return value;
        }

        function processData() {
            const exportedFields = fieldConfigs.filter(config => config.export);
            const processedData = [];

            // 處理標題行
            const headers = exportedFields.map(config => config.newName);
            processedData.push(headers);

            // 處理資料行
            const dataRows = [];
            for (let i = 1; i < rawData.length; i++) {
                const row = rawData[i];
                const processedRow = [];

                exportedFields.forEach(config => {
                    const originalIndex = fieldConfigs.findIndex(fc => fc.originalName === config.originalName);
                    const originalValue = row[originalIndex] || '';
                    const maskedValue = applyMaskRule(originalValue, config.maskRule);
                    processedRow.push(maskedValue);
                });

                dataRows.push(processedRow);
            }

            // 應用排序規則
            const sortField = fieldConfigs.find(config => config.export && config.sortRule !== 'none');
            if (sortField) {
                const sortIndex = exportedFields.findIndex(config => config.originalName === sortField.originalName);
                if (sortIndex !== -1) {
                    dataRows.sort((a, b) => {
                        const valueA = a[sortIndex];
                        const valueB = b[sortIndex];
                        
                        // 嘗試數字比較
                        const numA = parseFloat(valueA);
                        const numB = parseFloat(valueB);
                        
                        let comparison;
                        if (!isNaN(numA) && !isNaN(numB)) {
                            comparison = numA - numB;
                        } else {
                            comparison = String(valueA).localeCompare(String(valueB), 'zh-TW');
                        }
                        
                        return sortField.sortRule === 'desc' ? -comparison : comparison;
                    });
                }
            }

            // 合併標題和資料
            processedData.push(...dataRows);
            return processedData;
        }

        async function processAndDownload() {
            const loadingIndicator = document.getElementById('loadingIndicator');
            const processButton = document.getElementById('processButton');
            
            loadingIndicator.style.display = 'block';
            processButton.disabled = true;

            try {
                const processedData = processData();
                const reportTitle = document.getElementById('reportTitle').value || '資料報表';
                const selectedFormat = document.querySelector('input[name="outputFormat"]:checked').value;

                await new Promise(resolve => setTimeout(resolve, 1000)); // 模擬處理時間

                switch (selectedFormat) {
                    case 'excel':
                        downloadExcel(processedData, reportTitle);
                        break;
                    case 'pdf':
                        downloadPDF(processedData, reportTitle);
                        break;
                    case 'html':
                        downloadHTML(processedData, reportTitle);
                        break;
                }
            } catch (error) {
                console.error('處理失敗:', error);
            } finally {
                loadingIndicator.style.display = 'none';
                processButton.disabled = false;
            }
        }

        function downloadExcel(data, title) {
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "報表");
            XLSX.writeFile(wb, `${title}.xlsx`);
        }

        function downloadPDF(data, title) {
            // 創建一個臨時的 HTML 內容用於 PDF 轉換
            const htmlContent = generatePDFHTML(data, title);
            
            // 使用 window.print() 方式或提示用戶使用瀏覽器列印功能
            const printWindow = window.open('', '_blank');
            printWindow.document.write(htmlContent);
            printWindow.document.close();
            
            // 等待內容載入後自動觸發列印對話框
            printWindow.onload = function() {
                setTimeout(() => {
                    printWindow.print();
                    // 列印完成後關閉視窗（用戶可以取消）
                    printWindow.onafterprint = function() {
                        printWindow.close();
                    };
                }, 500);
            };
        }

        function generatePDFHTML(data, title) {
            return `<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>${title}</title>
    <style>
        @media print {
            body { margin: 0; }
            .no-print { display: none; }
        }
        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', 'SimHei', sans-serif;
            margin: 20px;
            font-size: 12px;
        }
        h1 {
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #333;
            padding: 8px;
            text-align: left;
            font-size: 11px;
        }
        th {
            background-color: #f0f0f0;
            font-weight: bold;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 10px;
            color: #666;
        }
        .print-info {
            text-align: center;
            margin: 20px 0;
            padding: 10px;
            background: #e3f2fd;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="print-info no-print">
        <p><strong>PDF 匯出說明：</strong></p>
        <p>請使用瀏覽器的列印功能，選擇「另存為 PDF」來儲存檔案</p>
        <p>建議設定：紙張大小 A4，邊界最小，包含背景圖形</p>
    </div>
    
    <h1>${title}</h1>
    <table>
        ${data.map((row, index) => 
            index === 0 
                ? `<thead><tr>${row.map(cell => `<th>${cell || ''}</th>`).join('')}</tr></thead><tbody>`
                : `<tr>${row.map(cell => `<td>${cell || ''}</td>`).join('')}</tr>`
        ).join('')}
        </tbody>
    </table>
    <div class="footer">
        報表產生時間：${new Date().toLocaleString('zh-TW')}
    </div>
</body>
</html>`;
        }

        function downloadHTML(data, title) {
            const htmlContent = `
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${title}</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            margin: 0;
            padding: 40px;
            background: #f8f9fa;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
        }
        tr:nth-child(even) {
            background: #f8f9fa;
        }
        tr:hover {
            background: #e3f2fd;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #7f8c8d;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>${title}</h1>
        <table>
            ${data.map((row, index) => 
                index === 0 
                    ? `<thead><tr>${row.map(cell => `<th>${cell}</th>`).join('')}</tr></thead><tbody>`
                    : `<tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`
            ).join('')}
            </tbody>
        </table>
        <div class="footer">
            報表產生時間：${new Date().toLocaleString('zh-TW')}
        </div>
    </div>
</body>
</html>`;

            const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${title}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Element SDK 初始化
        async function render(config) {
            document.getElementById('app-title').textContent = config.app_title || defaultConfig.app_title;
